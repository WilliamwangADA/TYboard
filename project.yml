name: TYboard
options:
  bundleIdPrefix: com.tyboard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "01.00.01"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
targets:
  TYboard:
    type: application
    platform: iOS
    sources:
      - path: TYboard
    settings:
      base:
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "TYboard需要语音识别权限来支持语音输入"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "TYboard需要麦克风权限来录制语音"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "TYboard需要相册权限来导入素材"
